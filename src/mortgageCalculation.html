<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mortgage Calculation</title>
</head>
<style>
    .childcontainerBody{
        border: 3px solid #f1f1f1;
        box-sizing: border-box;
        width: 45%;
        margin: auto;
        padding: 8px 16px;
    }
    label, input, button {
        display: inline-block;
        width: 45%;
        margin: 6px 12px;
    }
    label {
        text-align: left;
    }
    button {
        width: 95%;
    }
</style>
<body>
    <div class="parent.container">
        <div class="childcontainerHeader">
            <center><h2>Mortgage Calculation</h2></center>
        </div>
        <div class="childcontainerBody">
            <label for="amount">Principal: </label>
            <input type="text" placeholder="$" id="amount" required>
            <label for="monthlyInterest">Monthly Interest: </label>
            <input type="text" placeholder="%" id="monthlyInterest" required>
            <label for="period">Period: </label>
            <input type="text" placeholder="" id="period" required>
            <label for="deposit">Deposit: </label>
            <input type="text" placeholder="%" id="deposit" required>
            <button class="sumButton" onclick="monthlyPay()">Calculate</button>
            <label for="monthlyPayment">Monthly Payment: </label>
            <input type="text" placeholder="$" id="monthlyPayment" >
        </div>
    </div>
    <script>
        function monthlyPay(){
            let inputAmount = document.getElementById("amount").value;
            document.getElementById("monthlyPayment").value = inputAmount;
        }
    </script>
</body>
</html>
